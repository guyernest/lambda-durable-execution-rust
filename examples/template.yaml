            - Effect: Allow
              Action:
                - lambda:CheckpointDurableExecution
              Resource: "*"

  ParallelNamedExampleFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: parallel_named
    Properties:
      CodeUri: .
      Policies:
        - AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - Statement:
            - Effect: Allow
              Action:
                - lambda:CheckpointDurableExecution
              Resource: "*"

  ParallelFirstSuccessfulExampleFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: parallel_first_successful
    Properties:
      CodeUri: .
