Outputs:
  MapOperationsExampleFunctionArn:
    Description: Map operations example function ARN
    Value: !GetAtt MapOperationsExampleFunction.Arn
  ParallelExampleFunctionArn:
    Description: Parallel example function ARN
    Value: !GetAtt ParallelExampleFunction.Arn
  ParallelNamedExampleFunctionArn:
