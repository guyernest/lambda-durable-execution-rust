    Value: !GetAtt MapWithCustomSerdesExampleFunction.Arn
  WaitForCallbackHeartbeatExampleFunctionArn:
    Description: Wait for callback heartbeat example function ARN
    Value: !GetAtt WaitForCallbackHeartbeatExampleFunction.Arn
  WaitForCallbackMultipleInvocationsExampleFunctionArn:
