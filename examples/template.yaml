        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - Statement:
            - Effect: Allow
              Action:
                - lambda:CheckpointDurableExecution
              Resource: "*"
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Join [":", [!GetAtt InvokeTargetExampleFunction.Arn, "$LATEST"]]
      Environment:
        Variables:
          INVOKE_TARGET_FUNCTION: !Join [":", [!GetAtt InvokeTargetExampleFunction.Arn, "$LATEST"]]

  HelloWorldExampleFunction:
